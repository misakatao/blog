<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="autumnSky" x1="800" y1="0" x2="800" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5E6CA"/>
      <stop offset="0.5" stop-color="#E8C9A0"/>
      <stop offset="1" stop-color="#D4A574"/>
    </linearGradient>
    <linearGradient id="road" x1="800" y1="700" x2="800" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B8B8B"/>
      <stop offset="1" stop-color="#6B6B6B"/>
    </linearGradient>
    <filter id="softGlow"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="shadow"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <rect width="1600" height="900" fill="url(#autumnSky)"/>

  <!-- Window frame -->
  <rect x="200" y="80" width="1200" height="720" rx="8" fill="#FFFFFF" opacity="0.15"/>
  <rect x="220" y="100" width="1160" height="680" rx="4" fill="url(#autumnSky)" opacity="0.5"/>

  <!-- Window divider -->
  <line x1="800" y1="80" x2="800" y2="800" stroke="#C4A882" stroke-width="6"/>
  <line x1="200" y1="440" x2="1400" y2="440" stroke="#C4A882" stroke-width="6"/>

  <!-- Street scene through window -->
  <rect x="220" y="620" width="1160" height="160" fill="url(#road)" opacity="0.6"/>

  <!-- Crosswalk stripes -->
  <g fill="#FFFFFF" opacity="0.5">
    <rect x="700" y="640" width="60" height="8" rx="2"/>
    <rect x="700" y="660" width="60" height="8" rx="2"/>
    <rect x="700" y="680" width="60" height="8" rx="2"/>
    <rect x="700" y="700" width="60" height="8" rx="2"/>
    <rect x="700" y="720" width="60" height="8" rx="2"/>
    <rect x="700" y="740" width="60" height="8" rx="2"/>
    <rect x="840" y="640" width="60" height="8" rx="2"/>
    <rect x="840" y="660" width="60" height="8" rx="2"/>
    <rect x="840" y="680" width="60" height="8" rx="2"/>
    <rect x="840" y="700" width="60" height="8" rx="2"/>
    <rect x="840" y="720" width="60" height="8" rx="2"/>
    <rect x="840" y="740" width="60" height="8" rx="2"/>
  </g>

  <!-- Distant girl silhouette on crosswalk -->
  <g transform="translate(790, 560)" opacity="0.55">
    <ellipse cx="0" cy="-8" rx="10" ry="12" fill="#5A4A3A"/>
    <path d="M-8 4L-12 50L-6 50Z" fill="#5A4A3A"/>
    <path d="M8 4L12 50L6 50Z" fill="#5A4A3A"/>
    <path d="M-14 8C-18 30 -20 45 -22 55L22 55C20 45 18 30 14 8Z" fill="#C4856C"/>
    <path d="M-10 55L-14 100" stroke="#D4A88A" stroke-width="4"/>
    <path d="M10 55L14 100" stroke="#D4A88A" stroke-width="4"/>
    <ellipse cx="-14" cy="104" rx="6" ry="3" fill="#FFFFFF"/>
    <ellipse cx="14" cy="104" rx="6" ry="3" fill="#FFFFFF"/>
  </g>

  <!-- Autumn leaves floating -->
  <g fill="#C4703A" opacity="0.4">
    <ellipse cx="400" cy="200" rx="8" ry="4" transform="rotate(30 400 200)"/>
    <ellipse cx="1100" cy="300" rx="6" ry="3" transform="rotate(-20 1100 300)"/>
    <ellipse cx="600" cy="350" rx="7" ry="3.5" transform="rotate(45 600 350)"/>
    <ellipse cx="1200" cy="180" rx="5" ry="2.5" transform="rotate(15 1200 180)"/>
  </g>
  <g fill="#D4944A" opacity="0.3">
    <ellipse cx="350" cy="400" rx="6" ry="3" transform="rotate(-35 350 400)"/>
    <ellipse cx="1050" cy="250" rx="7" ry="3" transform="rotate(25 1050 250)"/>
  </g>

  <!-- Warm light glow -->
  <circle cx="800" cy="450" r="300" fill="#F5D6A0" opacity="0.1" filter="url(#softGlow)"/>

  <!-- Coffee cup on windowsill -->
  <g transform="translate(320, 750)">
    <ellipse cx="0" cy="0" rx="18" ry="6" fill="#8B6B4A"/>
    <path d="M-18 0L-14 -40L14 -40L18 0Z" fill="#A0805A"/>
    <ellipse cx="0" cy="-40" rx="14" ry="5" fill="#6B4A2A"/>
    <path d="M18 -30C28 -30 32 -20 28 -14C24 -8 18 -10 18 -10" stroke="#A0805A" stroke-width="3" fill="none"/>
    <path d="M-4 -50C-2 -60 2 -60 4 -50" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4" fill="none"/>
    <path d="M2 -52C4 -62 8 -62 10 -52" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3" fill="none"/>
  </g>

  <!-- Title -->
  <text x="112" y="126" fill="#5A3A1A" fill-opacity="0.90" font-family="'Noto Serif SC', 'Source Han Serif', Georgia, serif" font-size="80" font-weight="700">好看</text>
  <text x="118" y="192" fill="#5A3A1A" fill-opacity="0.70" font-family="'Noto Serif SC', 'Source Han Serif', Georgia, serif" font-size="28">她那时候是真好看。现在想起来，还是好看</text>
</svg>
