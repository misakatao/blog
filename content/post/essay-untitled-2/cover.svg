<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="warmBg" x1="800" y1="0" x2="800" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF9F2"/>
      <stop offset="0.4" stop-color="#FFE8CC"/>
      <stop offset="0.75" stop-color="#F5D0A8"/>
      <stop offset="1" stop-color="#E8BC88"/>
    </linearGradient>
    <radialGradient id="warmLight" cx="800" cy="280" r="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDE7" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#FFE8CC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floorGlow" cx="800" cy="750" r="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD090" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#E8BC88" stop-opacity="0"/>
    </radialGradient>
    <filter id="bokehBlur"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="softGlow"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>

  <rect width="1600" height="900" fill="url(#warmBg)"/>
  <circle cx="800" cy="280" r="420" fill="url(#warmLight)"/>
  <circle cx="800" cy="750" r="300" fill="url(#floorGlow)"/>

  <!-- Window light shaft -->
  <path d="M1080 0L1280 0L1280 900L1080 900Z" fill="#FFFDE7" opacity="0.07"/>

  <!-- Floor -->
  <path d="M0 760C400 740 900 748 1600 760V900H0Z" fill="#D4A870" opacity="0.45"/>
  <path d="M0 830C400 810 900 818 1600 830V900H0Z" fill="#C49060" opacity="0.38"/>

  <!-- Anime girl sitting, taking off socks -->
  <g transform="translate(610, 195)">
    <!-- Skirt (light, casual) -->
    <path d="M68 238C40 243 18 263 10 300L-4 462H282L266 300C258 263 236 243 208 238Z" fill="#F0E8D8"/>
    <path d="M68 238C61 260 58 286 61 312" stroke="#D4C0A0" stroke-width="2" opacity="0.48"/>
    <path d="M208 238C215 260 218 286 215 312" stroke="#D4C0A0" stroke-width="2" opacity="0.48"/>
    <path d="M68 238C90 228 186 228 208 238" stroke="#D4C0A0" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Neck -->
    <rect x="108" y="207" width="60" height="36" rx="8" fill="#FDDBB4"/>

    <!-- Head -->
    <ellipse cx="138" cy="172" rx="76" ry="82" fill="#FDDBB4"/>

    <!-- Hair (warm brown, medium) -->
    <path d="M64 130C52 96 56 62 72 38C88 14 114 4 136 6C158 8 176 22 186 46C196 70 192 98 186 122L178 150C166 180 158 212 154 246C150 280 148 314 152 348C156 382 162 416 170 450C138 424 116 386 102 348C88 310 80 272 76 236C72 200 76 164 80 142Z" fill="#8B5E3C"/>
    <path d="M64 130C56 104 62 76 78 56C94 36 116 26 136 28C156 30 172 44 180 66C188 88 184 112 178 132Z" fill="#8B5E3C"/>
    <path d="M64 130C54 152 52 176 56 198C60 220 70 238 82 252" stroke="#8B5E3C" stroke-width="14" stroke-linecap="round"/>
    <path d="M82 48C94 38 110 32 124 36" stroke="#C4906A" stroke-width="3.5" stroke-linecap="round" opacity="0.52"/>
    <path d="M90 64C100 54 114 50 126 54" stroke="#C4906A" stroke-width="2.5" stroke-linecap="round" opacity="0.36"/>

    <!-- Eyes (warm, gentle, looking down) -->
    <ellipse cx="108" cy="170" rx="16" ry="18" fill="#1A0A2E"/>
    <ellipse cx="168" cy="170" rx="16" ry="18" fill="#1A0A2E"/>
    <ellipse cx="108" cy="171" rx="12" ry="14" fill="#8B4513"/>
    <ellipse cx="168" cy="171" rx="12" ry="14" fill="#8B4513"/>
    <ellipse cx="108" cy="173" rx="7"  ry="8"  fill="#5C2A0A"/>
    <ellipse cx="168" cy="173" rx="7"  ry="8"  fill="#5C2A0A"/>
    <circle cx="113" cy="164" r="4.5" fill="white"/>
    <circle cx="173" cy="164" r="4.5" fill="white"/>
    <circle cx="115" cy="166" r="2.2" fill="white" opacity="0.65"/>
    <!-- Eyelashes (looking down) -->
    <path d="M92 160C96 154 103 151 108 153"  stroke="#1A0A2E" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M183 153C188 151 195 154 199 160" stroke="#1A0A2E" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Nose -->
    <path d="M128 188C131 192 137 192 140 188" stroke="#D4956A" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Mouth (soft smile) -->
    <path d="M116 202C124 209 152 209 160 202" stroke="#D4956A" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <!-- Blush -->
    <ellipse cx="88"  cy="184" rx="15" ry="8" fill="#FFB3C6" opacity="0.42"/>
    <ellipse cx="188" cy="184" rx="15" ry="8" fill="#FFB3C6" opacity="0.42"/>

    <!-- Arms (leaning forward, reaching for foot) -->
    <path d="M10 305C-14 318 -26 340 -20 362" stroke="#FDDBB4" stroke-width="20" stroke-linecap="round"/>
    <path d="M266 305C290 318 302 340 296 362" stroke="#FDDBB4" stroke-width="20" stroke-linecap="round"/>
    <!-- Right hand reaching toward foot -->
    <path d="M296 362C310 380 318 402 308 420" stroke="#FDDBB4" stroke-width="18" stroke-linecap="round"/>
    <ellipse cx="306" cy="424" rx="16" ry="11" fill="#FDDBB4"/>

    <!-- Legs (sitting, one raised) -->
    <!-- Left leg down -->
    <path d="M32 462C12 494 2 534 6 566" stroke="#FDDBB4" stroke-width="30" stroke-linecap="round"/>
    <!-- Right leg raised (foot being held) -->
    <path d="M244 462C264 440 280 418 272 396" stroke="#FDDBB4" stroke-width="30" stroke-linecap="round"/>

    <!-- Left foot with white sock -->
    <ellipse cx="6"   cy="574" rx="30" ry="15" fill="#F5F0E8"/>
    <ellipse cx="6"   cy="570" rx="22" ry="10" fill="white" opacity="0.9"/>
    <!-- Sock texture -->
    <path d="M-14 572C-6 568 6 567 18 570" stroke="#E8E0D0" stroke-width="1.5" opacity="0.6"/>
    <path d="M-16 578C-8 574 6 573 20 576" stroke="#E8E0D0" stroke-width="1.5" opacity="0.5"/>

    <!-- Right foot (sock being removed, bare toes showing) -->
    <ellipse cx="270" cy="390" rx="30" ry="16" fill="#FDDBB4"/>
    <!-- Toes -->
    <ellipse cx="255" cy="381" rx="7"   ry="5.5" fill="#FDDBB4"/>
    <ellipse cx="265" cy="378" rx="6.5" ry="5"   fill="#FDDBB4"/>
    <ellipse cx="275" cy="379" rx="6"   ry="4.5" fill="#FDDBB4"/>
    <ellipse cx="284" cy="383" rx="5.5" ry="4"   fill="#FDDBB4"/>
    <ellipse cx="291" cy="389" rx="4.5" ry="3.5" fill="#FDDBB4"/>
    <!-- Sock half-removed -->
    <path d="M244 406C252 398 264 394 278 396C290 398 298 404 296 412" stroke="#F5F0E8" stroke-width="12" stroke-linecap="round" fill="none"/>
    <path d="M244 406C252 398 264 394 278 396C290 398 298 404 296 412" stroke="white" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.85"/>
  </g>

  <!-- Discarded sock on floor -->
  <g transform="translate(900, 680)">
    <path d="M0 0C20 -8 50 -6 70 4C80 10 82 20 70 26C50 32 20 30 0 20C-10 14 -10 6 0 0Z" fill="white" opacity="0.88"/>
    <path d="M2 2C18 -4 46 -2 64 6" stroke="#E8E0D0" stroke-width="1.5" opacity="0.55"/>
    <path d="M0 12C16 6 44 8 62 16" stroke="#E8E0D0" stroke-width="1.5" opacity="0.45"/>
  </g>

  <!-- Bokeh (warm) -->
  <circle cx="200"  cy="320" r="52" fill="#FFE066" opacity="0.09" filter="url(#bokehBlur)"/>
  <circle cx="1400" cy="300" r="62" fill="#FFE066" opacity="0.09" filter="url(#bokehBlur)"/>
  <circle cx="300"  cy="660" r="38" fill="#FFB3C6" opacity="0.11" filter="url(#bokehBlur)"/>
  <circle cx="1300" cy="640" r="42" fill="#FFB3C6" opacity="0.11" filter="url(#bokehBlur)"/>
  <circle cx="550"  cy="180" r="30" fill="#FFE8CC" opacity="0.1"  filter="url(#bokehBlur)"/>
  <circle cx="1050" cy="160" r="35" fill="#FFE8CC" opacity="0.1"  filter="url(#bokehBlur)"/>

  <!-- Title -->
  <text x="112" y="126" fill="#5C2A0A" fill-opacity="0.88" font-family="'Noto Serif SC', 'Source Han Serif', Georgia, serif" font-size="80" font-weight="700">无题（二）</text>
  <text x="118" y="192" fill="#5C2A0A" fill-opacity="0.70" font-family="'Noto Serif SC', 'Source Han Serif', Georgia, serif" font-size="28">那双白棉袜裹过她的脚，棉布的纹理里藏着她的路</text>
</svg>
