<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nightBg" x1="800" y1="0" x2="800" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060C1E"/>
      <stop offset="0.45" stop-color="#0E1F45"/>
      <stop offset="0.8" stop-color="#1A3060"/>
      <stop offset="1" stop-color="#243870"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="1250" cy="130" r="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8F0FF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#0E1F45" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bedGlow" cx="800" cy="620" r="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B8CCF0" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#0E1F45" stop-opacity="0"/>
    </radialGradient>
    <filter id="bokehBlur"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="softGlow"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>

  <rect width="1600" height="900" fill="url(#nightBg)"/>
  <circle cx="1250" cy="130" r="220" fill="url(#moonGlow)"/>
  <circle cx="800" cy="620" r="320" fill="url(#bedGlow)"/>

  <!-- Moon -->
  <circle cx="1250" cy="130" r="58" fill="#EEF4FF" opacity="0.88"/>
  <circle cx="1272" cy="118" r="58" fill="#0E1F45" opacity="0.82"/>

  <!-- Stars -->
  <circle cx="80"  cy="70"  r="2"   fill="white" opacity="0.65"/>
  <circle cx="260" cy="45"  r="1.5" fill="white" opacity="0.55"/>
  <circle cx="480" cy="62"  r="2"   fill="white" opacity="0.6"/>
  <circle cx="680" cy="38"  r="1.5" fill="white" opacity="0.5"/>
  <circle cx="860" cy="55"  r="2"   fill="white" opacity="0.58"/>
  <circle cx="1040" cy="72" r="1.5" fill="white" opacity="0.48"/>
  <circle cx="1380" cy="48" r="2"   fill="white" opacity="0.62"/>
  <circle cx="1520" cy="88" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="180"  cy="120" r="1.5" fill="white" opacity="0.38"/>
  <circle cx="420"  cy="105" r="1"   fill="white" opacity="0.32"/>
  <circle cx="620"  cy="95"  r="1.5" fill="white" opacity="0.38"/>
  <circle cx="1080" cy="110" r="1"   fill="white" opacity="0.32"/>
  <circle cx="1440" cy="125" r="1.5" fill="white" opacity="0.38"/>

  <!-- Bokeh -->
  <circle cx="180"  cy="380" r="55" fill="#4A6FA5" opacity="0.09" filter="url(#bokehBlur)"/>
  <circle cx="1420" cy="340" r="65" fill="#4A6FA5" opacity="0.09" filter="url(#bokehBlur)"/>
  <circle cx="280"  cy="700" r="42" fill="#6A8FC5" opacity="0.09" filter="url(#bokehBlur)"/>
  <circle cx="1320" cy="680" r="48" fill="#6A8FC5" opacity="0.09" filter="url(#bokehBlur)"/>

  <!-- Floor/bed base -->
  <path d="M0 730C400 710 900 718 1600 730V900H0Z" fill="#0A1428" opacity="0.9"/>
  <path d="M0 810C400 790 900 798 1600 810V900H0Z" fill="#060C1E" opacity="0.8"/>

  <!-- Bed scene -->
  <g transform="translate(460, 310)">
    <!-- Mattress edge -->
    <rect x="-80" y="295" width="820" height="38" rx="8" fill="#182848" opacity="0.85"/>
    <!-- Pillow -->
    <ellipse cx="110" cy="282" rx="130" ry="36" fill="#243870" opacity="0.75"/>
    <!-- Blanket body -->
    <path d="M-60 292C20 272 220 266 520 276C620 280 660 288 610 302L-60 322Z" fill="#1E3A6E" opacity="0.88"/>
    <path d="M-60 292C20 272 220 266 520 276" stroke="#2A4F8A" stroke-width="2" opacity="0.45"/>
    <!-- Blanket fold highlight -->
    <path d="M420 274C470 271 520 276 540 282" stroke="#3A5F9A" stroke-width="2.5" opacity="0.38"/>

    <!-- Sleeping girl head on pillow -->
    <ellipse cx="88" cy="260" rx="54" ry="50" fill="#FDDBB4"/>

    <!-- Hair spread on pillow -->
    <path d="M38 232C24 210 26 186 38 168C50 150 70 142 88 144C106 146 120 158 126 176C132 194 128 214 122 230L114 248C104 268 96 290 92 312C88 334 88 356 92 378C70 360 52 334 42 308C32 282 28 256 30 232Z" fill="#3D2B1F"/>
    <path d="M38 232C30 208 36 182 50 162C64 142 84 134 102 136C120 138 132 152 136 172C140 192 136 214 130 232Z" fill="#3D2B1F"/>
    <path d="M38 232C22 244 14 260 18 278C22 296 34 308 46 314" stroke="#3D2B1F" stroke-width="13" stroke-linecap="round"/>
    <path d="M34 254C16 264 8 280 12 298" stroke="#3D2B1F" stroke-width="9" stroke-linecap="round"/>
    <path d="M52 170C62 160 76 154 88 158" stroke="#5C4033" stroke-width="3" stroke-linecap="round" opacity="0.48"/>

    <!-- Closed eyes -->
    <path d="M66 256C72 252 80 251 88 253" stroke="#2C1810" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M62 254C66 250 72 248 78 250" stroke="#2C1810" stroke-width="2" stroke-linecap="round"/>
    <!-- Nose -->
    <path d="M80 268C83 272 87 272 90 268" stroke="#D4956A" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Mouth -->
    <path d="M74 280C80 284 88 284 94 280" stroke="#C47A5A" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <!-- Blush -->
    <ellipse cx="60" cy="270" rx="12" ry="7" fill="#FFB6C1" opacity="0.32"/>

    <!-- Feet peeking from covers -->
    <path d="M490 278C522 272 554 274 574 282" stroke="#FDDBB4" stroke-width="30" stroke-linecap="round"/>
    <ellipse cx="576" cy="282" rx="30" ry="17" fill="#FDDBB4"/>
    <!-- Toes -->
    <ellipse cx="560" cy="273" rx="7.5" ry="5.5" fill="#FDDBB4"/>
    <ellipse cx="571" cy="270" rx="6.5" ry="5"   fill="#FDDBB4"/>
    <ellipse cx="581" cy="271" rx="6"   ry="4.5" fill="#FDDBB4"/>
    <ellipse cx="590" cy="275" rx="5.5" ry="4"   fill="#FDDBB4"/>
    <ellipse cx="597" cy="281" rx="4.5" ry="3.5" fill="#FDDBB4"/>
    <!-- Foot arch -->
    <path d="M560 290C568 295 578 295 586 290" stroke="#F0C090" stroke-width="1.5" opacity="0.45"/>
  </g>

  <!-- Moonlight beam -->
  <path d="M1180 0L1320 0L960 900L820 900Z" fill="white" opacity="0.018"/>

  <!-- Dust motes -->
  <g fill="#C8D8F0" opacity="0.38">
    <circle cx="710" cy="460" r="2"/>
    <circle cx="730" cy="440" r="1.5"/>
    <circle cx="910" cy="430" r="2"/>
    <circle cx="890" cy="450" r="1.5"/>
    <circle cx="760" cy="510" r="1.5"/>
    <circle cx="860" cy="490" r="1.5"/>
  </g>

  <!-- Title -->
  <text x="112" y="126" fill="#FFFFFF" fill-opacity="0.95" font-family="'Noto Serif SC', 'Source Han Serif', Georgia, serif" font-size="80" font-weight="700">无题</text>
  <text x="118" y="192" fill="#C8D8F0" fill-opacity="0.80" font-family="'Noto Serif SC', 'Source Han Serif', Georgia, serif" font-size="28">她的脚不喜欢被看见，可睡着了就管不了那么多</text>
</svg>
