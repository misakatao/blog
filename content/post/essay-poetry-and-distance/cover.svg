<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nightSky" x1="800" y1="0" x2="800" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A1A2E"/>
      <stop offset="0.4" stop-color="#16213E"/>
      <stop offset="1" stop-color="#0F3460"/>
    </linearGradient>
    <linearGradient id="horizon" x1="800" y1="600" x2="800" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A1A3A"/>
      <stop offset="1" stop-color="#0A0A1A"/>
    </linearGradient>
    <filter id="softGlow"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="starGlow"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <rect width="1600" height="900" fill="url(#nightSky)"/>

  <!-- Distant mountains -->
  <path d="M0 650L200 480L400 550L600 420L800 500L1000 380L1200 460L1400 520L1600 440L1600 900L0 900Z" fill="url(#horizon)" opacity="0.6"/>

  <!-- Stars -->
  <g fill="#FFFFFF">
    <circle cx="200" cy="120" r="1.5" opacity="0.8"/>
    <circle cx="450" cy="80" r="1" opacity="0.6"/>
    <circle cx="700" cy="150" r="1.5" opacity="0.7"/>
    <circle cx="950" cy="60" r="1" opacity="0.5"/>
    <circle cx="1150" cy="130" r="1.5" opacity="0.8"/>
    <circle cx="1350" cy="90" r="1" opacity="0.6"/>
    <circle cx="300" cy="250" r="1" opacity="0.4"/>
    <circle cx="550" cy="300" r="1.5" opacity="0.5"/>
    <circle cx="1050" cy="220" r="1" opacity="0.6"/>
    <circle cx="1400" cy="280" r="1.5" opacity="0.4"/>
    <circle cx="100" cy="350" r="1" opacity="0.3"/>
    <circle cx="850" cy="200" r="1" opacity="0.5"/>
  </g>

  <!-- Moon -->
  <circle cx="1200" cy="180" r="60" fill="#F5E6CA" opacity="0.15" filter="url(#softGlow)"/>
  <circle cx="1200" cy="180" r="30" fill="#F5E6CA" opacity="0.6"/>
  <circle cx="1210" cy="175" r="28" fill="url(#nightSky)" opacity="0.3"/>

  <!-- Warm window light in distance -->
  <rect x="380" y="520" width="24" height="30" rx="2" fill="#F5C87A" opacity="0.5"/>
  <rect x="420" y="525" width="20" height="25" rx="2" fill="#F5C87A" opacity="0.35"/>
  <rect x="1080" y="490" width="22" height="28" rx="2" fill="#F5C87A" opacity="0.4"/>

  <!-- Bed silhouette in foreground -->
  <g transform="translate(600, 680)" opacity="0.25">
    <rect x="0" y="0" width="400" height="120" rx="6" fill="#2A2A4A"/>
    <rect x="-10" y="-20" width="120" height="40" rx="8" fill="#2A2A4A"/>
    <rect x="280" y="-20" width="120" height="40" rx="8" fill="#2A2A4A"/>
    <path d="M60 -10C100 -50 180 -60 240 -40C280 -25 300 -10 340 -10" stroke="#3A3A5A" stroke-width="2" fill="none" opacity="0.6"/>
  </g>

  <!-- Warm glow from center -->
  <circle cx="800" cy="700" r="200" fill="#F5C87A" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Title -->
  <text x="112" y="126" fill="#E8D5B5" fill-opacity="0.90" font-family="'Noto Serif SC', 'Source Han Serif', Georgia, serif" font-size="80" font-weight="700">谈诗和远方</text>
  <text x="118" y="192" fill="#E8D5B5" fill-opacity="0.60" font-family="'Noto Serif SC', 'Source Han Serif', Georgia, serif" font-size="28">她就是我的远方，门票不贵，可惜有效期太短</text>
</svg>
