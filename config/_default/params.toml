mainSections   = ["post"]
rssFullContent = true
favicon        = "img/favicon.png"

[footer]
    since = 2026

[sidebar]
    compact = false
    emoji   = "🌸"
    avatar  = "img/avatar.png"

[article]
    math        = false
    toc         = true
    readingTime = true

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [{ type = "toc" }]

[colorScheme]
    toggle  = true
    default = "auto"

[comments]
    enabled = false
