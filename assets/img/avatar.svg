<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#AEE0FF"/>
      <stop offset="100%" stop-color="#D4EEFF"/>
    </linearGradient>
    <clipPath id="circ"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <g clip-path="url(#circ)">
    <!-- shirt -->
    <path d="M25 200 L25 162 Q62 146 100 150 Q138 146 175 162 L175 200 Z" fill="#5B9BD5"/>
    <path d="M84 150 L100 170 L116 150 Q100 156 84 150Z" fill="white"/>
    <!-- neck -->
    <rect x="88" y="143" width="24" height="16" rx="6" fill="#FDDBB4"/>
    <!-- face -->
    <ellipse cx="100" cy="104" rx="44" ry="48" fill="#FDDBB4"/>
    <!-- ears -->
    <ellipse cx="56" cy="106" rx="8" ry="10" fill="#FDDBB4"/>
    <ellipse cx="144" cy="106" rx="8" ry="10" fill="#FDDBB4"/>
    <ellipse cx="56" cy="106" rx="5" ry="7" fill="#F0C090"/>
    <ellipse cx="144" cy="106" rx="5" ry="7" fill="#F0C090"/>
    <!-- hair back -->
    <ellipse cx="100" cy="76" rx="50" ry="44" fill="#3A2518"/>
    <!-- hair front -->
    <path d="M50 92 Q54 50 100 44 Q146 50 150 92 Q136 68 100 66 Q64 68 50 92Z" fill="#4A3020"/>
    <!-- hair strands -->
    <path d="M76 50 Q70 36 76 26" stroke="#4A3020" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M100 44 Q97 30 101 22" stroke="#4A3020" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M124 50 Q130 36 124 26" stroke="#4A3020" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- side hair -->
    <path d="M50 92 Q46 112 50 128" stroke="#4A3020" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M150 92 Q154 112 150 128" stroke="#4A3020" stroke-width="11" fill="none" stroke-linecap="round"/>
    <!-- eyebrows -->
    <path d="M71 90 Q82 85 92 88" stroke="#3A2518" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M108 88 Q118 85 129 90" stroke="#3A2518" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- left eye -->
    <ellipse cx="82" cy="104" rx="12" ry="13" fill="white"/>
    <ellipse cx="82" cy="106" rx="9" ry="10" fill="#4A90D9"/>
    <ellipse cx="82" cy="107" rx="5.5" ry="6.5" fill="#1A1A2E"/>
    <ellipse cx="86" cy="103" rx="3" ry="3" fill="white"/>
    <ellipse cx="79" cy="105" rx="1.5" ry="1.5" fill="white" opacity="0.7"/>
    <path d="M70 98 Q82 93 94 98" stroke="#2C1810" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- right eye -->
    <ellipse cx="118" cy="104" rx="12" ry="13" fill="white"/>
    <ellipse cx="118" cy="106" rx="9" ry="10" fill="#4A90D9"/>
    <ellipse cx="118" cy="107" rx="5.5" ry="6.5" fill="#1A1A2E"/>
    <ellipse cx="122" cy="103" rx="3" ry="3" fill="white"/>
    <ellipse cx="115" cy="105" rx="1.5" ry="1.5" fill="white" opacity="0.7"/>
    <path d="M106 98 Q118 93 130 98" stroke="#2C1810" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- nose -->
    <path d="M97 119 Q100 124 103 119" stroke="#D4956A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- smile -->
    <path d="M87 131 Q100 142 113 131" stroke="#C47A5A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- blush -->
    <ellipse cx="68" cy="118" rx="11" ry="6" fill="#FFB6C1" opacity="0.45"/>
    <ellipse cx="132" cy="118" rx="11" ry="6" fill="#FFB6C1" opacity="0.45"/>
  </g>
</svg>
