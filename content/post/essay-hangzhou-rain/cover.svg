<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rainSky" x1="800" y1="0" x2="800" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1B2A"/>
      <stop offset="0.45" stop-color="#1B4F72"/>
      <stop offset="0.8" stop-color="#5B8DB8"/>
      <stop offset="1" stop-color="#8FBCD4"/>
    </linearGradient>
    <linearGradient id="puddle" x1="800" y1="820" x2="800" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3A7CA5" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#1B4F72" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="umbrellaGlow" cx="800" cy="320" r="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A8D8EA" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#1B4F72" stop-opacity="0"/>
    </radialGradient>
    <filter id="rainBlur"><feGaussianBlur stdDeviation="1.5"/></filter>
    <filter id="softGlow"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <rect width="1600" height="900" fill="url(#rainSky)"/>
  <circle cx="800" cy="320" r="200" fill="url(#umbrellaGlow)"/>

  <!-- Rain streaks (many thin diagonal lines) -->
  <g stroke="#A8D8EA" stroke-width="1" opacity="0.35">
    <line x1="50" y1="0" x2="20" y2="900"/>
    <line x1="130" y1="0" x2="100" y2="900"/>
    <line x1="210" y1="0" x2="180" y2="900"/>
    <line x1="290" y1="0" x2="260" y2="900"/>
    <line x1="370" y1="0" x2="340" y2="900"/>
    <line x1="450" y1="0" x2="420" y2="900"/>
    <line x1="530" y1="0" x2="500" y2="900"/>
    <line x1="610" y1="0" x2="580" y2="900"/>
    <line x1="690" y1="0" x2="660" y2="900"/>
    <line x1="770" y1="0" x2="740" y2="900"/>
    <line x1="850" y1="0" x2="820" y2="900"/>
    <line x1="930" y1="0" x2="900" y2="900"/>
    <line x1="1010" y1="0" x2="980" y2="900"/>
    <line x1="1090" y1="0" x2="1060" y2="900"/>
    <line x1="1170" y1="0" x2="1140" y2="900"/>
    <line x1="1250" y1="0" x2="1220" y2="900"/>
    <line x1="1330" y1="0" x2="1300" y2="900"/>
    <line x1="1410" y1="0" x2="1380" y2="900"/>
    <line x1="1490" y1="0" x2="1460" y2="900"/>
    <line x1="1570" y1="0" x2="1540" y2="900"/>
  </g>
  <g stroke="#A8D8EA" stroke-width="0.8" opacity="0.2">
    <line x1="90" y1="0" x2="60" y2="900"/>
    <line x1="170" y1="0" x2="140" y2="900"/>
    <line x1="250" y1="0" x2="220" y2="900"/>
    <line x1="330" y1="0" x2="300" y2="900"/>
    <line x1="490" y1="0" x2="460" y2="900"/>
    <line x1="650" y1="0" x2="620" y2="900"/>
    <line x1="730" y1="0" x2="700" y2="900"/>
    <line x1="890" y1="0" x2="860" y2="900"/>
    <line x1="1050" y1="0" x2="1020" y2="900"/>
    <line x1="1130" y1="0" x2="1100" y2="900"/>
    <line x1="1290" y1="0" x2="1260" y2="900"/>
    <line x1="1370" y1="0" x2="1340" y2="900"/>
    <line x1="1530" y1="0" x2="1500" y2="900"/>
  </g>

  <!-- Ground / wet street -->
  <path d="M0 820C400 800 900 808 1600 820V900H0Z" fill="#0D1B2A" opacity="0.9"/>
  <ellipse cx="800" cy="855" rx="320" ry="28" fill="url(#puddle)"/>

  <!-- Puddle ripples -->
  <ellipse cx="800" cy="855" rx="80" ry="8" stroke="#A8D8EA" stroke-width="1" fill="none" opacity="0.4"/>
  <ellipse cx="800" cy="855" rx="140" ry="14" stroke="#A8D8EA" stroke-width="0.8" fill="none" opacity="0.3"/>
  <ellipse cx="800" cy="855" rx="200" ry="20" stroke="#A8D8EA" stroke-width="0.6" fill="none" opacity="0.2"/>

  <!-- Anime girl with umbrella, centered -->
  <g transform="translate(730, 240)">
    <!-- Umbrella -->
    <path d="M70 0C-60 0 -120 60 -120 120C-60 90 0 80 70 80C140 80 200 90 260 120C260 60 200 0 70 0Z" fill="#E8A0BF"/>
    <path d="M70 0C-60 0 -120 60 -120 120C-60 90 0 80 70 80C140 80 200 90 260 120C260 60 200 0 70 0Z" fill="none" stroke="#C47FA0" stroke-width="2"/>
    <!-- Umbrella ribs -->
    <line x1="70" y1="0" x2="-120" y2="120" stroke="#C47FA0" stroke-width="1.5" opacity="0.6"/>
    <line x1="70" y1="0" x2="-30" y2="80" stroke="#C47FA0" stroke-width="1.5" opacity="0.6"/>
    <line x1="70" y1="0" x2="70" y2="80" stroke="#C47FA0" stroke-width="1.5" opacity="0.6"/>
    <line x1="70" y1="0" x2="170" y2="80" stroke="#C47FA0" stroke-width="1.5" opacity="0.6"/>
    <line x1="70" y1="0" x2="260" y2="120" stroke="#C47FA0" stroke-width="1.5" opacity="0.6"/>
    <!-- Umbrella handle -->
    <line x1="70" y1="0" x2="70" y2="200" stroke="#8B6914" stroke-width="5" stroke-linecap="round"/>
    <path d="M70 200C70 220 55 230 50 225" stroke="#8B6914" stroke-width="5" stroke-linecap="round" fill="none"/>

    <!-- Body (raincoat) -->
    <path d="M40 220C18 225 0 245 -8 285L-22 440H162L148 285C140 245 122 225 100 220Z" fill="#5B8DB8"/>
    <!-- Raincoat highlight -->
    <path d="M40 220C32 245 30 275 34 305" stroke="#7AAFD4" stroke-width="2" opacity="0.5"/>

    <!-- Neck -->
    <rect x="55" y="195" width="30" height="30" rx="5" fill="#FDDBB4"/>

    <!-- Head -->
    <ellipse cx="70" cy="165" rx="58" ry="64" fill="#FDDBB4"/>

    <!-- Hair (long, wet-looking) -->
    <path d="M16 125C6 92 10 58 26 36C42 14 66 6 84 8C102 10 118 22 126 42C134 62 130 86 124 108L116 132C106 158 100 185 96 215C92 245 90 275 93 305C96 335 100 365 106 395C82 372 64 338 52 304C40 270 34 236 32 204C30 172 34 142 38 122Z" fill="#1A3A5C"/>
    <path d="M16 125C10 98 16 70 32 50C48 30 68 22 84 24C100 26 114 38 120 58C126 78 122 100 116 120Z" fill="#1A3A5C"/>
    <path d="M16 125C8 142 6 162 10 182C14 202 22 218 30 228" stroke="#1A3A5C" stroke-width="12" stroke-linecap="round"/>
    <!-- Hair highlight -->
    <path d="M40 42C50 32 64 26 76 30" stroke="#3A6A9A" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

    <!-- Eyes (looking slightly down, melancholic) -->
    <ellipse cx="50" cy="162" rx="15" ry="16" fill="#1A0A2E"/>
    <ellipse cx="90" cy="162" rx="15" ry="16" fill="#1A0A2E"/>
    <ellipse cx="50" cy="163" rx="11" ry="12" fill="#2A6A9A"/>
    <ellipse cx="90" cy="163" rx="11" ry="12" fill="#2A6A9A"/>
    <ellipse cx="50" cy="165" rx="7" ry="7" fill="#1A3A5C"/>
    <ellipse cx="90" cy="165" rx="7" ry="7" fill="#1A3A5C"/>
    <circle cx="55" cy="157" r="4" fill="white"/>
    <circle cx="95" cy="157" r="4" fill="white"/>
    <!-- Eyelashes -->
    <path d="M35 152C38 147 44 144 50 146" stroke="#1A0A2E" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M105 146C111 144 117 147 120 152" stroke="#1A0A2E" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Nose -->
    <path d="M66 178C68 181 72 181 74 178" stroke="#D4956A" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Mouth (soft, slightly sad) -->
    <path d="M58 190C64 194 76 194 82 190" stroke="#D4956A" stroke-width="2" stroke-linecap="round" fill="none"/>
    <!-- Blush (subtle) -->
    <ellipse cx="36" cy="175" rx="12" ry="6" fill="#FFB3C6" opacity="0.28"/>
    <ellipse cx="104" cy="175" rx="12" ry="6" fill="#FFB3C6" opacity="0.28"/>

    <!-- Rain drops on face -->
    <circle cx="30" cy="185" r="2" fill="#A8D8EA" opacity="0.7"/>
    <circle cx="112" cy="178" r="1.5" fill="#A8D8EA" opacity="0.6"/>

    <!-- Arms holding umbrella -->
    <path d="M100 230C110 220 115 210 112 200" stroke="#FDDBB4" stroke-width="16" stroke-linecap="round"/>

    <!-- Bare feet at bottom -->
    <path d="M10 440C0 460 -5 480 0 490" stroke="#FDDBB4" stroke-width="18" stroke-linecap="round"/>
    <path d="M130 440C140 460 145 480 140 490" stroke="#FDDBB4" stroke-width="18" stroke-linecap="round"/>
    <!-- Feet -->
    <ellipse cx="0" cy="494" rx="18" ry="10" fill="#FDDBB4"/>
    <ellipse cx="140" cy="494" rx="18" ry="10" fill="#FDDBB4"/>
  </g>

  <!-- Water drops falling -->
  <g fill="#A8D8EA" opacity="0.6">
    <ellipse cx="300" cy="400" rx="2" ry="5"/>
    <ellipse cx="500" cy="300" rx="2" ry="5"/>
    <ellipse cx="1100" cy="350" rx="2" ry="5"/>
    <ellipse cx="1300" cy="450" rx="2" ry="5"/>
    <ellipse cx="200" cy="600" rx="1.5" ry="4"/>
    <ellipse cx="1400" cy="550" rx="1.5" ry="4"/>
  </g>

  <!-- Title -->
  <text x="112" y="126" fill="#FFFFFF" fill-opacity="0.95" font-family="'Noto Serif SC', 'Source Han Serif', Georgia, serif" font-size="80" font-weight="700">杭州的雨</text>
  <text x="118" y="192" fill="#FFFFFF" fill-opacity="0.80" font-family="'Noto Serif SC', 'Source Han Serif', Georgia, serif" font-size="28">雨下得正好，不早不晚</text>
</svg>
